apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-fleetdb-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fleetdb-init
          image: {{ .Values.fleetdm.image.repository }}:{{ .Values.fleetdm.image.tag }}
          env:
            - name: FLEET_SERVER_ADDRESS
              value: {{ .Values.fleetdm.serverAddress | quote }}
            - name: FLEET_MYSQL_ADDRESS
              value: "{{ .Release.Name }}-mysql:{{ .Values.fleetdm.mysql.port }}"
            - name: FLEET_MYSQL_DATABASE
              value: {{ .Values.fleetdm.mysql.database | quote }}
            - name: FLEET_MYSQL_USERNAME
              value: {{ .Values.fleetdm.mysql.username | quote }}
            - name: FLEET_MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mysql
                  key: {{ .Values.fleetdm.mysql.passwordSecretKey | quote }}
            - name: FLEET_REDIS_ADDRESS
              value: "{{ .Release.Name }}-redis-master:{{ .Values.fleetdm.redis.port }}"
            - name: FLEET_REDIS_DATABASE
              value: {{ .Values.fleetdm.redis.database | quote }}
            - name: FLEET_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-redis
                  key: {{ .Values.fleetdm.redis.passwordSecretKey | quote }}
          command:
            - sh
            - -c
            - >
              echo "Waiting for MySQL...";
              sleep 10;
              echo "Preparing database...";
              fleet prepare db;
              echo "Database prepared successfully";